<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxFlow — Voice-First AI Agent</title>
  <meta name="description"
    content="VoxFlow is a voice-first intelligent AI agent that helps you retrieve information, understand context, and take actions through natural conversation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/jpeg" href="/logo.jpeg" />
  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Ambient Background -->
    <div class="ambient-bg">
      <div class="ambient-orb orb-1"></div>
      <div class="ambient-orb orb-2"></div>
      <div class="ambient-orb orb-3"></div>
    </div>

    <!-- Header -->
    <header id="app-header">
      <div class="header-brand">
        <img class="brand-icon" src="/logo.jpeg" alt="VoxFlow Logo" />
        <h1 class="brand-name">VoxFlow</h1>
      </div>
      <div class="header-controls">
        <button id="clearMemoryBtn" class="clear-memory-btn" title="Clear conversation memory">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
            <path d="M3 6h18"/>
            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
          </svg>
          <span>Clear Memory</span>
        </button>
        <div class="debug-toggle" id="debugToggle" title="Toggle pipeline debug view">
          <span class="debug-toggle-label">Debug</span>
          <div class="debug-switch"></div>
        </div>
        <div class="header-status">
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Ready</span>
        </div>
      </div>
    </header>

    <!-- Main Chat Area -->
    <main id="chatArea">
      <div id="chatMessages" class="chat-messages">
        <!-- Welcome message -->
        <div class="message assistant-message welcome-message" id="welcomeMessage">
          <div class="message-avatar">
            <img src="/logo.jpeg" alt="VoxFlow" class="avatar-logo" />
          </div>
          <div class="message-content">
            <p class="message-greeting">Hey there! 👋</p>
            <p>I'm <strong>VoxFlow</strong>, your voice-first AI assistant. Tap the mic and start talking, or type
              below.</p>
            <div class="quick-actions">
              <button class="quick-action-btn" data-query="What can you do?">What can you do?</button>
              <button class="quick-action-btn" data-query="Set a reminder">Set a reminder</button>
              <button class="quick-action-btn" data-query="Search for something">Search for something</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Input Area -->
    <footer id="inputArea">
      <div class="input-container">
        <!-- Mic Button -->
        <button id="micBtn" class="mic-btn" aria-label="Start voice input" title="Tap to speak">
          <div class="mic-pulse-ring"></div>
          <div class="mic-pulse-ring ring-2"></div>
          <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="23" />
            <line x1="8" y1="23" x2="16" y2="23" />
          </svg>
          <svg class="mic-stop-icon hidden" viewBox="0 0 24 24" fill="currentColor">
            <rect x="6" y="6" width="12" height="12" rx="2" />
          </svg>
        </button>

        <!-- Text Input -->
        <div class="text-input-wrapper">
          <input type="text" id="textInput" class="text-input" placeholder="Type a message or tap the mic..."
            autocomplete="off" />
          <button id="sendBtn" class="send-btn" aria-label="Send message" title="Send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13" />
              <polygon points="22 2 15 22 11 13 2 9 22 2" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Live Transcript -->
      <div id="liveTranscript" class="live-transcript hidden">
        <div class="transcript-wave">
          <span></span><span></span><span></span><span></span><span></span>
        </div>
        <p id="transcriptText" class="transcript-text">Listening...</p>
      </div>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>

</html>
